<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title description">
  <title id="title">About Abdullah A. Emon</title>
  <desc id="description">An animated profile card showing Abdullah's role, focus, engineering principles, and location.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080D17" />
      <stop offset="0.55" stop-color="#0D1626" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#39D9FF" />
      <stop offset="0.52" stop-color="#8B5CF6" />
      <stop offset="1" stop-color="#F7A41D" />
    </linearGradient>
    <radialGradient id="blueGlow">
      <stop offset="0" stop-color="#39D9FF" stop-opacity="0.22" />
      <stop offset="1" stop-color="#39D9FF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="orangeGlow">
      <stop offset="0" stop-color="#F7A41D" stop-opacity="0.16" />
      <stop offset="1" stop-color="#F7A41D" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#94A3B8" stroke-opacity="0.045" />
    </pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.32" />
    </filter>
  </defs>

  <style>
    .sans { font-family: Inter, "Segoe UI", Arial, sans-serif; }
    .mono { font-family: "Fira Code", Consolas, "Courier New", monospace; }
    .orbit {
      transform-box: fill-box;
      transform-origin: center;
      animation: rotate 14s linear infinite;
    }
    .orbit-reverse {
      transform-box: fill-box;
      transform-origin: center;
      animation: rotate 9s linear infinite reverse;
    }
    .pulse {
      transform-box: fill-box;
      transform-origin: center;
      animation: pulse 2.7s ease-in-out infinite;
    }
    .status { animation: status 1.8s ease-in-out infinite; }
    .flow {
      stroke-dasharray: 7 13;
      animation: flow 2.8s linear infinite;
    }
    .card {
      opacity: 0;
      animation: reveal 0.75s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    .card-1 { animation-delay: 0.15s; }
    .card-2 { animation-delay: 0.3s; }
    .card-3 { animation-delay: 0.45s; }
    .card-4 { animation-delay: 0.6s; }
    .cursor { animation: blink 0.85s steps(2, end) infinite; }
    .scan { animation: scan 5s ease-in-out infinite; }
    @keyframes rotate {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(0.9); opacity: 0.42; }
      50% { transform: scale(1.12); opacity: 1; }
    }
    @keyframes status {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 1; }
    }
    @keyframes flow {
      to { stroke-dashoffset: -40; }
    }
    @keyframes reveal {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    @keyframes scan {
      0% { transform: translateX(-180px); opacity: 0; }
      15%, 85% { opacity: 0.65; }
      100% { transform: translateX(420px); opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
      .card { opacity: 1; }
    }
  </style>

  <rect width="1200" height="340" rx="24" fill="url(#background)" />
  <rect x="1" y="1" width="1198" height="338" rx="23" fill="none" stroke="#29384F" />
  <rect width="1200" height="340" rx="24" fill="url(#grid)" />
  <ellipse cx="124" cy="155" rx="250" ry="210" fill="url(#blueGlow)" />
  <ellipse cx="1110" cy="300" rx="260" ry="180" fill="url(#orangeGlow)" />

  <g filter="url(#shadow)">
    <rect x="38" y="35" width="320" height="270" rx="20" fill="#0A111E" stroke="#26374F" />
    <rect x="39" y="36" width="318" height="3" rx="1.5" fill="url(#accent)" />
  </g>

  <g transform="translate(198 139)">
    <circle r="80" fill="#0B1826" stroke="#263A54" />
    <circle r="66" fill="none" stroke="#39D9FF" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="8 12" class="orbit" />
    <circle r="53" fill="none" stroke="#8B5CF6" stroke-opacity="0.45" stroke-width="1.5" stroke-dasharray="4 9" class="orbit-reverse" />
    <circle r="42" fill="#101C2D" stroke="#32445E" />
    <circle r="47" fill="none" stroke="#39D9FF" stroke-opacity="0.25" class="pulse" />
    <text x="0" y="11" text-anchor="middle" fill="#EAF2FC" font-size="32" font-weight="900" class="sans" letter-spacing="-1">AE</text>
    <circle cx="58" cy="-58" r="6" fill="#37E69A" filter="url(#glow)" class="status" />
  </g>

  <g class="sans" text-anchor="middle">
    <text x="198" y="246" fill="#E1EAF5" font-size="16" font-weight="800">ABDULLAH A. EMON</text>
    <text x="198" y="268" fill="#7589A3" font-size="11" font-weight="700" letter-spacing="1.7">FULL-STACK DEVELOPER</text>
  </g>

  <g transform="translate(84 282)" class="sans">
    <rect width="228" height="27" rx="13.5" fill="#0F211D" stroke="#245C4B" />
    <circle cx="17" cy="13.5" r="4" fill="#37E69A" class="status" />
    <text x="31" y="18" fill="#85DDBD" font-size="10" font-weight="800" letter-spacing="1.1">BUILDING RELIABLE SYSTEMS</text>
  </g>

  <path d="M358 170 C384 170 388 92 420 92 H456" fill="none" stroke="#29405A" stroke-width="2" />
  <path d="M358 170 C384 170 388 248 420 248 H456" fill="none" stroke="#29405A" stroke-width="2" />
  <path d="M358 170 H420" fill="none" stroke="url(#accent)" stroke-width="2" class="flow" />

  <g filter="url(#glow)">
    <circle r="4" fill="#39D9FF">
      <animateMotion path="M358 170 C384 170 388 92 420 92 H456" dur="3.6s" repeatCount="indefinite" />
    </circle>
    <circle r="4" fill="#F7A41D">
      <animateMotion path="M358 170 C384 170 388 248 420 248 H456" dur="4.2s" begin="-2.1s" repeatCount="indefinite" />
    </circle>
  </g>

  <g class="sans">
    <text x="416" y="51" fill="#7C91AC" font-size="12" font-weight="800" letter-spacing="3">ABOUT / PROFILE</text>
    <text x="416" y="82" fill="#E7EEF8" font-size="23" font-weight="800">Engineering business complexity into software<tspan class="cursor" fill="#39D9FF">_</tspan></text>

    <g class="card card-1" transform="translate(416 105)">
      <rect width="350" height="86" rx="14" fill="#0C1B28" stroke="#24546A" />
      <rect width="4" height="86" rx="2" fill="#39D9FF" />
      <text x="22" y="27" fill="#5EDDF8" font-size="10" font-weight="900" letter-spacing="2">CURRENT ROLE</text>
      <text x="22" y="54" fill="#DCE6F2" font-size="16" font-weight="800">Logic Software Ltd.</text>
      <text x="22" y="73" fill="#71859E" font-size="11">Full-stack product engineering</text>
      <rect x="320" y="11" width="2" height="64" fill="url(#accent)" opacity="0.5" class="scan" />
    </g>

    <g class="card card-2" transform="translate(788 105)">
      <rect width="374" height="86" rx="14" fill="#17152A" stroke="#4E407A" />
      <rect width="4" height="86" rx="2" fill="#8B5CF6" />
      <text x="22" y="27" fill="#BBA7FF" font-size="10" font-weight="900" letter-spacing="2">CORE FOCUS</text>
      <text x="22" y="54" fill="#DCE6F2" font-size="16" font-weight="800">ERP · APIs · Automation</text>
      <text x="22" y="73" fill="#71859E" font-size="11">Scalable business workflows</text>
    </g>

    <g class="card card-3" transform="translate(416 211)">
      <rect width="350" height="86" rx="14" fill="#21180B" stroke="#69501F" />
      <rect width="4" height="86" rx="2" fill="#F7A41D" />
      <text x="22" y="27" fill="#FFC45C" font-size="10" font-weight="900" letter-spacing="2">ENGINEERING MINDSET</text>
      <text x="22" y="54" fill="#DCE6F2" font-size="16" font-weight="800">Reliable · Scalable · Clean</text>
      <text x="22" y="73" fill="#71859E" font-size="11">Performance with maintainability</text>
    </g>

    <g class="card card-4" transform="translate(788 211)">
      <rect width="374" height="86" rx="14" fill="#0C211A" stroke="#28634E" />
      <rect width="4" height="86" rx="2" fill="#37E69A" />
      <text x="22" y="27" fill="#6DE5B7" font-size="10" font-weight="900" letter-spacing="2">BASED IN</text>
      <text x="22" y="54" fill="#DCE6F2" font-size="16" font-weight="800">Bangladesh · UTC+6</text>
      <text x="22" y="73" fill="#71859E" font-size="11">Open to meaningful collaboration</text>
    </g>
  </g>
</svg>
