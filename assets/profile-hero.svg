<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title description">
  <title id="title">Abdullah A. Emon — Full-Stack Developer</title>
  <desc id="description">An animated developer command center focused on ERP systems, APIs, and scalable web applications.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070B14" />
      <stop offset="0.55" stop-color="#0D1525" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="nameGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="0.45" stop-color="#E7EEF9" />
      <stop offset="0.72" stop-color="#39D9FF" />
      <stop offset="1" stop-color="#F7A41D" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#39D9FF" stop-opacity="0" />
      <stop offset="0.35" stop-color="#39D9FF" />
      <stop offset="0.7" stop-color="#8B5CF6" />
      <stop offset="1" stop-color="#F7A41D" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="blueGlow">
      <stop offset="0" stop-color="#39D9FF" stop-opacity="0.23" />
      <stop offset="1" stop-color="#39D9FF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="orangeGlow">
      <stop offset="0" stop-color="#F7A41D" stop-opacity="0.20" />
      <stop offset="1" stop-color="#F7A41D" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#94A3B8" stroke-opacity="0.055" stroke-width="1" />
    </pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.38" />
    </filter>
    <clipPath id="terminalClip">
      <rect x="774" y="76" width="362" height="286" rx="20" />
    </clipPath>
  </defs>

  <style>
    .sans { font-family: Inter, "Segoe UI", Arial, sans-serif; }
    .mono { font-family: "Fira Code", Consolas, "Courier New", monospace; }
    .data-rail {
      stroke-dasharray: 8 14;
      animation: rail 3.2s linear infinite;
    }
    .orbit {
      transform-box: fill-box;
      transform-origin: center;
      animation: orbit 16s linear infinite;
    }
    .orbit-reverse {
      transform-box: fill-box;
      transform-origin: center;
      animation: orbit 11s linear infinite reverse;
    }
    .float {
      animation: float 5s ease-in-out infinite;
    }
    .pulse {
      transform-box: fill-box;
      transform-origin: center;
      animation: pulse 2.6s ease-in-out infinite;
    }
    .pulse-delay { animation-delay: 1.3s; }
    .status-dot {
      animation: status 1.9s ease-in-out infinite;
    }
    .terminal-line {
      opacity: 0;
      animation: line-in 9s ease infinite;
    }
    .line-1 { animation-delay: 0.2s; }
    .line-2 { animation-delay: 1.0s; }
    .line-3 { animation-delay: 1.8s; }
    .line-4 { animation-delay: 2.6s; }
    .line-5 { animation-delay: 3.4s; }
    .line-6 { animation-delay: 4.2s; }
    .cursor { animation: blink 0.85s steps(2, end) infinite; }
    .scan {
      animation: scan 4.6s ease-in-out infinite;
    }
    .shimmer {
      animation: shimmer 6s ease-in-out infinite;
    }
    @keyframes rail {
      to { stroke-dashoffset: -44; }
    }
    @keyframes orbit {
      to { transform: rotate(360deg); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(0.88); opacity: 0.45; }
      50% { transform: scale(1.14); opacity: 1; }
    }
    @keyframes status {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 1; }
    }
    @keyframes line-in {
      0%, 5% { opacity: 0; transform: translateY(7px); }
      11%, 82% { opacity: 1; transform: translateY(0); }
      92%, 100% { opacity: 0; transform: translateY(0); }
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    @keyframes scan {
      0% { transform: translateY(-36px); opacity: 0; }
      15%, 85% { opacity: 0.5; }
      100% { transform: translateY(310px); opacity: 0; }
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.12; }
      50% { opacity: 0.34; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
      .terminal-line { opacity: 1; }
    }
  </style>

  <rect width="1200" height="440" rx="26" fill="url(#background)" />
  <rect x="1" y="1" width="1198" height="438" rx="25" fill="none" stroke="#2A3850" />
  <rect width="1200" height="440" rx="26" fill="url(#grid)" />

  <ellipse cx="180" cy="70" rx="300" ry="230" fill="url(#blueGlow)" class="shimmer" />
  <ellipse cx="1040" cy="360" rx="330" ry="250" fill="url(#orangeGlow)" class="shimmer" />

  <path d="M0 352 C228 303 322 424 553 374 S894 292 1200 342" fill="none" stroke="url(#accentLine)" stroke-width="1.5" opacity="0.4" />
  <path d="M0 370 C228 321 322 442 553 392 S894 310 1200 360" fill="none" stroke="url(#accentLine)" stroke-width="1" opacity="0.18" class="data-rail" />

  <g opacity="0.55">
    <circle cx="111" cy="86" r="34" fill="none" stroke="#39D9FF" stroke-opacity="0.18" class="orbit" stroke-dasharray="7 10" />
    <circle cx="111" cy="86" r="23" fill="none" stroke="#8B5CF6" stroke-opacity="0.32" class="orbit-reverse" stroke-dasharray="4 8" />
    <circle cx="111" cy="86" r="5" fill="#39D9FF" filter="url(#glow)" class="pulse" />
  </g>

  <g class="sans">
    <g transform="translate(74 58)">
      <rect width="228" height="34" rx="17" fill="#101B2D" stroke="#263A55" />
      <circle cx="19" cy="17" r="5" fill="#37E69A" filter="url(#glow)" class="status-dot" />
      <text x="35" y="22" fill="#A9B8CC" font-size="12" font-weight="700" letter-spacing="1.2">AVAILABLE TO COLLABORATE</text>
    </g>

    <text x="74" y="151" fill="#8FA3BC" font-size="16" font-weight="700" letter-spacing="4">HELLO, I AM</text>
    <text x="70" y="218" fill="url(#nameGradient)" font-size="58" font-weight="800" letter-spacing="-1.4">Abdullah A. Emon</text>
    <text x="74" y="261" fill="#CCD7E6" font-size="23" font-weight="500">Full-Stack Developer · ERP-focused engineer</text>
    <text x="74" y="298" fill="#8092AA" font-size="16">Turning complex business workflows into reliable digital products.</text>

    <g transform="translate(74 326)">
      <g>
        <rect width="128" height="37" rx="10" fill="#0D2130" stroke="#1F5367" />
        <text x="64" y="24" text-anchor="middle" fill="#62E4FF" font-size="12" font-weight="800" letter-spacing="1">ERP SYSTEMS</text>
      </g>
      <g transform="translate(140)">
        <rect width="110" height="37" rx="10" fill="#1B1730" stroke="#4D3D7D" />
        <text x="55" y="24" text-anchor="middle" fill="#BCA8FF" font-size="12" font-weight="800" letter-spacing="1">REST APIs</text>
      </g>
      <g transform="translate(262)">
        <rect width="158" height="37" rx="10" fill="#2A1D0D" stroke="#6B491B" />
        <text x="79" y="24" text-anchor="middle" fill="#FFC45C" font-size="12" font-weight="800" letter-spacing="1">REAL-TIME APPS</text>
      </g>
    </g>
  </g>

  <g filter="url(#softShadow)" class="float">
    <rect x="774" y="76" width="362" height="286" rx="20" fill="#080D17" stroke="#2B3C55" />
    <rect x="774" y="76" width="362" height="48" rx="20" fill="#111A2A" />
    <path d="M774 104 V342 Q774 362 794 362 H1116 Q1136 362 1136 342 V104" fill="none" stroke="#2B3C55" />

    <circle cx="800" cy="100" r="5" fill="#FF6B6B" />
    <circle cx="820" cy="100" r="5" fill="#FFD166" />
    <circle cx="840" cy="100" r="5" fill="#37E69A" />
    <text x="955" y="105" text-anchor="middle" fill="#667A95" font-size="11" class="mono" letter-spacing="1.4">DEV_COMMAND_CENTER</text>

    <g clip-path="url(#terminalClip)">
      <rect x="778" y="124" width="354" height="2" fill="url(#accentLine)" opacity="0.7" class="scan" />
    </g>

    <g class="mono" font-size="15">
      <text x="802" y="157" fill="#39D9FF" class="terminal-line line-1">$ whoami</text>
      <text x="802" y="184" fill="#D6E1EF" class="terminal-line line-2">full-stack-developer</text>
      <text x="802" y="218" fill="#8B5CF6" class="terminal-line line-3">$ current_focus</text>
      <text x="802" y="245" fill="#D6E1EF" class="terminal-line line-4">ERP · APIs · scalable systems</text>
      <text x="802" y="279" fill="#F7A41D" class="terminal-line line-5">$ status</text>
      <text x="802" y="306" fill="#37E69A" class="terminal-line line-6">building_with_purpose<tspan class="cursor">_</tspan></text>
    </g>

    <g transform="translate(802 327)" class="sans">
      <rect width="304" height="7" rx="3.5" fill="#152236" />
      <rect width="226" height="7" rx="3.5" fill="url(#accentLine)">
        <animate attributeName="width" values="72;286;226;72" dur="7s" repeatCount="indefinite" />
      </rect>
      <text x="304" y="22" text-anchor="end" fill="#5F7189" font-size="10" letter-spacing="1">SYSTEMS ONLINE</text>
    </g>
  </g>

  <g filter="url(#glow)">
    <circle r="4" fill="#39D9FF">
      <animateMotion path="M0 352 C228 303 322 424 553 374 S894 292 1200 342" dur="5.4s" repeatCount="indefinite" />
    </circle>
    <circle r="3" fill="#F7A41D">
      <animateMotion path="M0 352 C228 303 322 424 553 374 S894 292 1200 342" dur="7s" begin="-3.5s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
